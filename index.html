<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Journal — Track Your Feelings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-wrapper">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h1 class="brand-name">MoodLog</h1>
            </div>

            <div class="sidebar-stats">
                <div class="stat-pill">
                    <span class="stat-label">Total Entries</span>
                    <span class="stat-value" id="entry-count">0 entries</span>
                </div>
            </div>

            <div class="sidebar-filters">
                <label class="filter-label">Filter by Mood</label>
                <select id="filter-mood" class="styled-select">
                    <option value="ALL">All Moods</option>
                    <option value="HAPPY">Happy</option>
                    <option value="SAD">Sad</option>
                    <option value="MOTIVATED">Motivated</option>
                    <option value="STRESSED">Stressed</option>
                    <option value="CALM">Calm</option>
                </select>
            </div>

            <div class="mood-legend">
                <p class="legend-title">Mood Colors</p>
                <div class="legend-item"><span class="legend-dot happy"></span>Happy</div>
                <div class="legend-item"><span class="legend-dot sad"></span>Sad</div>
                <div class="legend-item"><span class="legend-dot motivated"></span>Motivated</div>
                <div class="legend-item"><span class="legend-dot stressed"></span>Stressed</div>
                <div class="legend-item"><span class="legend-dot calm"></span>Calm</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Top Bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <span class="topbar-brand-mobile">MoodLog</span>
                </div>
                <div class="search-wrap">
                    <input type="text" id="search-input" class="search-input" placeholder="Search entries..." />
                </div>
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">Light Mode</button>
            </header>

            <!-- Entry Form -->
            <section class="form-section">
                <h2 id="form-title" class="form-heading">New Entry</h2>
                <form id="journal-form">
                    <div class="form-row">
                        <input type="text" id="entry-title" class="form-input" placeholder="Title your thought..." required>
                        <select id="entry-mood" class="form-input styled-select" required>
                            <option value="" disabled selected>Select mood...</option>
                            <option value="HAPPY">Happy</option>
                            <option value="SAD">Sad</option>
                            <option value="MOTIVATED">Motivated</option>
                            <option value="STRESSED">Stressed</option>
                            <option value="CALM">Calm</option>
                        </select>
                    </div>
                    <textarea id="entry-content" class="form-input form-textarea" placeholder="How are you feeling right now?" rows="4" required></textarea>
                    <div class="form-actions">
                        <button type="button" id="cancel-edit-btn" class="btn btn-secondary" style="display:none;">Cancel</button>
                        <button type="submit" id="submit-btn" class="btn btn-primary">Save Entry</button>
                    </div>
                </form>
            </section>

            <!-- Entries -->
            <section class="entries-section">
                <div id="entries-list"></div>
            </section>

        </main>
    </div>

    <script type="module" src="./dist/ui.js"></script>
</body>
</html>
